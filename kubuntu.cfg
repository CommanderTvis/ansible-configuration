[defaults]
inventory = localhost,
host_key_checking = False
timeout = 60
# Render task results (e.g. the pending-APT-changes report) as readable YAML
# instead of escaped JSON.
callback_result_format = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
password_mechanism = sshpass
