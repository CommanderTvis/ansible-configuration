---
- name: Ansible for Kubuntu 26.04
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: auto_silent
    managed_apt_packages:
      # System essentials
      - ansible
      - ansible-lint
      - init
      - bash
      - linux-generic
      - ubuntu-minimal
      - ubuntu-standard
      - kubuntu-desktop
      # Localization
      - language-pack-en-base
      - language-pack-en
      # CLI tools
      - wget
      - tree
      - fastfetch
      - ca-certificates
      - curl
      - git
      - gpg
      - pipx
      - openssh-server
      - unzip
      - zip # required by the SDKMAN installer
      # Development
      - postgresql-client-18
      - software-properties-common
      - apt-transport-https
      # Desktop applications
      - vlc
      - mpv
      - gource
      - syncthing
      - qdirstat
      - gimp
      - okular
      - kdeconnect
      # Flatpak support
      - flatpak
      - plasma-discover-backend-flatpak
      - kde-config-flatpak
      # Drivers and fonts
      - nvidia-driver-580
      - fonts-jetbrains-mono
      - qml-module-org-kde-notifications
      # Third-party repositories
      - tailscale
      # Brave via APT (not Flatpak) on purpose: the Flatpak build is sandboxed
      # and cannot reach 1Password's native-messaging host, so the 1Password
      # browser extension fails to connect. The APT build talks to 1Password's
      # NMH, so keep Brave on APT.
      - brave-browser
      - 1password
      - 1password-cli
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - warp-terminal
    managed_flatpaks:
      - md.obsidian.Obsidian
      - com.system76.Popsicle
      - net.ankiweb.Anki
      - org.zulip.Zulip
      - dev.zed.Zed
    # Kubuntu default apps to purge as bloatware. These arrive as
    # kubuntu-desktop *recommends* (auto-installed), so the exclusion-based
    # prune below never sees them and they must be removed explicitly. Purging a
    # not-installed package is a harmless no-op, and re-running removes any that
    # a kubuntu-desktop upgrade dragged back in via recommends.
    bloatware_apt_packages:
      - kate
      - kcalc
      - kcharselect
      - ksystemlog
    # APT packages that should NOT be removed (essential system packages)
    protected_apt_packages:
      # Package management and system foundations
      - apt
      - dpkg
      - base-files
      - base-passwd
      - debconf
      - adduser
      # Init system and boot
      - systemd
      - systemd-sysv
      - init
      - initramfs-tools
      - plymouth
      # Shells and core utilities
      - bash
      - dash
      - coreutils
      - util-linux
      - perl-base
      # User authentication and security
      - login
      - passwd
      - sudo
      - keyutils
      # Core system libraries
      - libc6
      - libstdc++6
      - libaio1t64
      # Ubuntu/Kubuntu metapackages
      - ubuntu-minimal
      - ubuntu-standard
      - kubuntu-desktop
      # Linux kernel
      - linux-generic
      - linux-image-generic
      - linux-headers-generic
      # BIOS/Legacy bootloader
      - grub-common
      - grub-pc
      - grub-pc-bin
      - grub2-common
      # EFI/UEFI bootloader
      - efibootmgr
      - grub-efi-amd64-signed
      - grub-efi-amd64-bin
      - grub-efi-amd64-unsigned
      - grub-gfxpayload-lists
      - shim-signed
      - mokutil
      # Disk and filesystem management
      - mount
      - fdisk
      - btrfs-progs
      - xfsprogs
      # LVM and device mapper
      - lvm2
      - liblvm2cmd2.03
      - dmeventd
      - libdevmapper-event1.02.1
      - thin-provisioning-tools
      # Hardware management
      - udev
      # System communication and networking
      - dbus
      - networkmanager
      - network-manager
      # Display server and login manager
      - sddm
      - xorg
      - xserver-xorg
      - wayland
      # KDE/Plasma desktop components
      - baloo-kf5
      - libappstreamqt5-3
      - kde-config-fcitx5
      # Password quality and security libraries
      - libpwquality1
      - libpwquality-common
      - libcrack2
      - cracklib-runtime
      # Miscellaneous libraries and utilities
      - libyaml-cpp0.8
      - libwebkit2gtk-4.1-0
  tasks:
    - name: Gathering Package Facts
      ansible.builtin.package_facts: { manager: apt }

    # =========================================================================
    # REPOSITORY CONFIGURATION
    # =========================================================================
    - name: Enable the Ubuntu restricted repository
      ansible.builtin.apt_repository:
        repo: "deb https://archive.ubuntu.com/ubuntu {{ ansible_facts['distribution_release'] }} restricted"
        state: present

    - name: Create APT keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # Tailscale
    - name: Download Tailscale GPG key
      ansible.builtin.shell: >
        curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/resolute.noarmor.gpg > /usr/share/keyrings/tailscale-archive-keyring.gpg
      args: { creates: /usr/share/keyrings/tailscale-archive-keyring.gpg }

    - name: Add Tailscale repository
      # No 'creates:' guard on purpose: a release upgrade (do-release-upgrade)
      # disables third-party sources, so re-establish the list every run to self-heal.
      ansible.builtin.shell: >
        curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/resolute.tailscale-keyring.list > /etc/apt/sources.list.d/tailscale.list
      changed_when: false

    # Brave Browser
    - name: Get Brave GPG key
      ansible.builtin.shell: >
        curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg
        https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
      args: { creates: /usr/share/keyrings/brave-browser-archive-keyring.gpg }

    - name: Add Brave browser release sources
      # No 'creates:' guard on purpose: a release upgrade disables third-party
      # sources (sets Enabled:no), so re-fetch the canonical file every run to self-heal.
      ansible.builtin.shell: >
        curl -fsSLo /etc/apt/sources.list.d/brave-browser-release.sources
        https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
      changed_when: false

    # 1Password
    - name: Download 1Password GPG key for APT
      ansible.builtin.shell: >
        curl -sS https://downloads.1password.com/linux/keys/1password.asc |
        gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
      args: { creates: /usr/share/keyrings/1password-archive-keyring.gpg }

    - name: Add 1Password repository
      # No 'creates:' guard on purpose: a release upgrade disables third-party
      # sources, so rewrite the list every run to self-heal.
      ansible.builtin.shell: >
        echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main' > /etc/apt/sources.list.d/1password.list
      changed_when: false

    - name: Setup 1Password debsig verification
      ansible.builtin.shell: |
        mkdir -p /etc/debsig/policies/AC2D62742012EA22/
        curl -sS https://downloads.1password.com/linux/debian/debsig/1password.pol > /etc/debsig/policies/AC2D62742012EA22/1password.pol
        mkdir -p /usr/share/debsig/keyrings/AC2D62742012EA22
        curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
      args: { creates: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg }

    # Docker
    - name: Download Docker GPG key
      ansible.builtin.shell: >
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      args: { creates: /etc/apt/keyrings/docker.asc }

    - name: Set Docker GPG key permissions
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.shell: >
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" > /etc/apt/sources.list.d/docker.list
      args: { creates: /etc/apt/sources.list.d/docker.list }

    # Warp
    - name: Refresh Warp GPG key for APT
      # No 'creates:' guard on purpose: Warp's signing key expires (~yearly),
      # so re-fetch and overwrite every run to self-heal before it goes stale.
      ansible.builtin.shell: >
        set -o pipefail &&
        curl -fsSL https://releases.warp.dev/linux/keys/warp.asc |
        gpg --dearmor --yes --output /etc/apt/keyrings/warpdotdev.gpg
      changed_when: false

    - name: Add Warp repository
      ansible.builtin.shell: >
        echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/warpdotdev.gpg] https://releases.warp.dev/linux/deb stable main' > /etc/apt/sources.list.d/warpdotdev.list
      args: { creates: /etc/apt/sources.list.d/warpdotdev.list }

    # =========================================================================
    # APT PACKAGE INSTALLATION (single step after all repos configured)
    # =========================================================================
    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: true

    - name: List upgradable APT packages # noqa: command-instead-of-module
      ansible.builtin.command: apt list --upgradable
      register: apt_upgradable
      changed_when: false
      check_mode: false

    # Visibility only: show what the next two tasks will actually do, without
    # needing to run ansible-playbook in verbose mode.
    - name: Show pending APT changes
      vars:
        new_apt_packages: "{{ managed_apt_packages | difference(ansible_facts.packages.keys() | list) }}"
        upgradable_lines: "{{ apt_upgradable.stdout_lines | reject('match', 'Listing') | list }}"
      ansible.builtin.debug:
        msg: |-
          New packages to install ({{ new_apt_packages | length }}):
          {{ new_apt_packages | join('\n') if new_apt_packages else '(none)' }}
          Packages to upgrade ({{ upgradable_lines | length }}):
          {{ upgradable_lines | join('\n') if upgradable_lines else '(none)' }}

    - name: Install all managed APT packages
      ansible.builtin.apt:
        name: "{{ managed_apt_packages }}"
        state: present

    - name: Upgrade APT packages
      ansible.builtin.apt: { upgrade: full }

    # =========================================================================
    # FLATPAK INSTALLATION
    # =========================================================================
    - name: Add the flathub flatpak repository remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install flatpaks
      community.general.flatpak:
        name: "{{ item }}"
        state: present
      loop: "{{ managed_flatpaks }}"

    # Guarantee the system Python stays externally-managed (PEP 668) so nothing
    # can pip-install into the global environment. force:false creates the marker
    # only if missing, never fighting the OS-shipped copy on upgrades.
    - name: Lock the global Python environment against pip installs (PEP 668)
      ansible.builtin.copy:
        dest: "/usr/lib/python{{ ansible_facts['python']['version']['major'] }}.{{ ansible_facts['python']['version']['minor'] }}/EXTERNALLY-MANAGED"
        force: false
        owner: root
        group: root
        mode: "0644"
        content: |
          [externally-managed]
          Error=This system's Python is externally managed. Install tools with pipx or uv/uvx, never pip into the global environment.

    - name: Configure pipx for user
      become: false
      ansible.builtin.command: pipx ensurepath
      register: pipx_ensurepath
      changed_when: false

    - name: List pipx packages before upgrade
      become: false
      ansible.builtin.command: pipx list --short
      register: pipx_before
      changed_when: false
      failed_when: false
      check_mode: false

    # pipx bootstraps uv only. Every other CLI tool is run through a uvx/bunx
    # wrapper (below), so nothing else is persistently installed.
    - name: Install uv via pipx
      become: false
      community.general.pipx:
        name: uv
        state: latest
      register: uv_pipx

    - name: List pipx packages after upgrade
      become: false
      ansible.builtin.command: pipx list --short
      register: pipx_after
      changed_when: false
      check_mode: false

    # Visibility only: show the version change when uv was installed/upgraded.
    - name: Show uv version change
      ansible.builtin.debug:
        msg: >-
          uv: {{ pipx_before.stdout_lines | default([]) | select('match', '^uv ')
          | first | default('not installed') }}
          -> {{ pipx_after.stdout_lines | default([]) | select('match', '^uv ')
          | first | default('unknown') }}
      when: pipx_before.stdout | default('') != pipx_after.stdout

    # Bun has no official APT repository or .deb package, so use the official
    # installer once (guarded by creates); afterwards `bun upgrade` manages updates.
    - name: Install Bun for user
      become: false
      ansible.builtin.shell: >
        curl -fsSL https://bun.sh/install | bash
      args: { creates: ~/.bun/bin/bun }

    # SDKMAN has no APT package, so use the official installer once (guarded by
    # creates); afterwards `sdk selfupdate` manages updates. The installer
    # appends its own init lines to ~/.bashrc and ~/.zshrc.
    - name: Install SDKMAN for user
      become: false
      ansible.builtin.shell: >
        set -o pipefail &&
        curl -s https://get.sdkman.io | bash
      args:
        creates: ~/.sdkman/bin/sdkman-init.sh
        executable: /bin/bash

    - name: Enable SDKMAN auto-answer for non-interactive use
      become: false
      ansible.builtin.lineinfile:
        path: ~/.sdkman/etc/config
        regexp: '^sdkman_auto_answer='
        line: sdkman_auto_answer=true

    - name: Manage GraalVM versions via SDKMAN (install, default, prune)
      become: false
      vars:
        graalvm_majors: ["25", "21"]
      ansible.builtin.shell: |
        export SDKMAN_DIR="$HOME/.sdkman"
        source "${SDKMAN_DIR}/bin/sdkman-init.sh"
        majors=({{ graalvm_majors | join(' ') }})
        managed=()
        changed=0
        for major in "${majors[@]}"; do
          id=$(sdk list java | grep -oE "${major}\.[0-9.]*-graal" | head -1)
          managed+=("$id")
          if [ ! -d "${SDKMAN_DIR}/candidates/java/${id}" ]; then
            echo "INSTALL java ${id}"
            sdk install java "$id"
            changed=1
          fi
        done
        sdk default java "${managed[0]}"
        for dir in "${SDKMAN_DIR}/candidates/java"/*/; do
          ver=$(basename "$dir")
          [ "$ver" = "current" ] && continue
          keep=0
          for m in "${managed[@]}"; do
            [ "$ver" = "$m" ] && keep=1 && break
          done
          if [ "$keep" -eq 0 ]; then
            echo "UNINSTALL java ${ver}"
            sdk uninstall java "$ver"
            changed=1
          fi
        done
        [ "$changed" -eq 1 ] && echo "CHANGED" || echo "CLEAN"
      args:
        executable: /bin/bash
      register: sdk_manage
      changed_when: "'CHANGED' in sdk_manage.stdout"

    # Visibility only: surface which JDKs the task above installed/removed,
    # without needing to run ansible-playbook in verbose mode.
    - name: Show GraalVM changes
      ansible.builtin.debug:
        msg: "{{ sdk_manage.stdout_lines | select('match', '^(INSTALL|UNINSTALL) ') | list }}"
      when: "'CHANGED' in sdk_manage.stdout"

    # Register Claude Code as the `claude` command. bunx fetches/runs the latest
    # published package on each invocation, so there is nothing to keep updated.
    - name: Ensure user local bin directory exists
      become: false
      ansible.builtin.file:
        path: ~/.local/bin
        state: directory
        mode: "0755"

    - name: Register Claude Code as the `claude` command via bunx
      become: false
      ansible.builtin.copy:
        dest: ~/.local/bin/claude
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          exec "$HOME/.bun/bin/bunx" --bun @anthropic-ai/claude-code "$@"

    # yt-dlp is run ephemerally via uvx (always latest, nothing installed).
    - name: Register yt-dlp as a uvx wrapper
      become: false
      ansible.builtin.copy:
        dest: ~/.local/bin/yt-dlp
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          exec "$HOME/.local/bin/uvx" yt-dlp "$@"

    - name: Ensure ~/.claude directory exists
      become: false
      ansible.builtin.file:
        path: ~/.claude
        state: directory
        mode: "0755"

    # Seed the global Claude Code instructions only if the file does not exist yet
    # (force:false), so a hand-edited ~/.claude/CLAUDE.md is never overwritten.
    # Content is embedded inline on purpose — this repo is a single playbook.
    - name: Seed global Claude Code instructions if absent
      become: false
      ansible.builtin.copy:
        dest: ~/.claude/CLAUDE.md
        force: false
        mode: "0644"
        content: |
          # Global instructions

          ## This machine is declaratively managed — do NOT install software ad hoc

          This machine's software is provisioned declaratively and centrally. Assume
          anything you might want is either already provided or intentionally absent.

          **Before installing anything, don't.** No `apt install`, `pip install`,
          `pipx install`, `snap install`, or pipe-to-shell installers to add tools on
          the fly.

          - If something seems genuinely needed long-term, ask me — don't add it yourself.
          - Manually-installed APT packages outside the managed set get removed
            automatically, so ad-hoc `apt install` isn't durable anyway.
          - For a one-off, prefer an ephemeral runner (`uvx <tool>` for Python CLIs,
            `bunx <pkg>` for JS) over installing.

          ## The global Python environment is locked (PEP 668) — never touch it

          System Python is marked externally-managed. **Never** `pip install` into it or
          use `--break-system-packages`. There is deliberately no global `pip`.

          - Run Python CLIs ephemerally: `uvx <tool>` (e.g. `uvx yt-dlp ...`).
          - Only if a persistent install is genuinely needed, as a last resort:
            `uv tool install <tool>`.

          ## JS

          `bun` is the runtime; use `bunx <pkg>` to run JS packages.

          ## Java/JVM — JDKs are managed declaratively via SDKMAN

          GraalVM JDKs (majors 25 and 21; 25 is the default `java`) are
          provisioned via SDKMAN. Any JDK outside the managed set is removed
          automatically, so never install JDKs ad hoc (`apt install openjdk-*`,
          manual `sdk install`) — if another version is genuinely needed, ask me.

          `sdk` is available in interactive shells; in non-interactive shells
          `source "$HOME/.sdkman/bin/sdkman-init.sh"` first.

          ## Already installed — don't reinstall

          git, curl, wget, gpg, unzip, zip, tree, fastfetch, openssh-server,
          `postgresql-client-18`, docker (ce + compose + buildx), tailscale,
          1password-cli, pipx, ansible, ansible-lint, `uv`/`uvx`, `bun`/`bunx`,
          SDKMAN (`sdk`) with GraalVM JDKs 25 (default) and 21, `claude`
          (Claude Code via bunx wrapper), `yt-dlp` (uvx wrapper).

    - name: Enable service Syncthing
      become: false
      ansible.builtin.systemd_service:
        name: syncthing.service
        enabled: true
        state: started
        scope: user

    - name: Configure global Git config
      become: false
      community.general.git_config:
        name: "{{ item.name }}"
        scope: global
        value: "{{ item.value }}"
      loop:
        - { name: init.defaultBranch, value: "master" }
        - { name: user.name, value: "Iaroslav Postovalov" }
        - { name: user.email, value: "postovalovya@gmail.com" }
        - { name: core.autocrlf, value: "input" }
        - name: user.signingkey
          value: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPhrNPHMWPV7gGuPheIX4POXrlPNNL2h/KMAJsAuSA0W"
        - { name: gpg.format, value: "ssh" }
        - { name: gpg.ssh.program, value: "/opt/1Password/op-ssh-sign" }
        - { name: commit.gpgsign, value: "true" }
      failed_when: "'/opt/1Password/op-ssh-sign' is not file"

    # =========================================================================
    # CLEANUP: Remove unmanaged Flatpak applications
    # =========================================================================
    - name: Gather installed Flatpak applications
      ansible.builtin.command: flatpak list --app --columns=application
      register: installed_flatpaks_raw
      changed_when: false
      failed_when: false

    - name: Prune unmanaged Flatpak applications
      vars:
        installed_flatpaks: "{{ installed_flatpaks_raw.stdout_lines | default([]) }}"
        unmanaged_flatpaks: "{{ installed_flatpaks | difference(managed_flatpaks) }}"
      when: unmanaged_flatpaks | length > 0
      block:
        - name: Confirm Flatpak pruning
          ansible.builtin.pause:
            prompt: |
              The following unmanaged Flatpak applications will be removed:
              {{ unmanaged_flatpaks | to_nice_yaml }}
              Press Enter to continue, or Ctrl+C and then 'A' to abort.

        - name: Remove unmanaged Flatpak applications
          community.general.flatpak:
            name: "{{ item }}"
            state: absent
          loop: "{{ unmanaged_flatpaks }}"

    # =========================================================================
    # CLEANUP: Purge Kubuntu bloatware (auto-installed, so invisible to the
    # exclusion-based prune below — must be removed by explicit name)
    # =========================================================================
    - name: Purge Kubuntu bloatware packages
      ansible.builtin.apt:
        name: "{{ bloatware_apt_packages }}"
        state: absent
        purge: true
        autoremove: true

    # =========================================================================
    # CLEANUP: Remove unmanaged APT packages
    # =========================================================================
    - name: Gather APT package information
      block:
        - name: Get manually installed packages (not auto-installed as dependencies)
          ansible.builtin.shell: |
            apt-mark showmanual | sort
          register: manually_installed_raw
          changed_when: false

        - name: Get all dependencies of managed packages
          ansible.builtin.shell: |
            apt-cache depends --recurse --no-recommends --no-suggests \
              --no-conflicts --no-breaks --no-replaces --no-enhances \
              {{ managed_apt_packages | join(' ') }} 2>/dev/null | \
              grep -E '^\w' | sort -u || true
          register: managed_deps_raw
          changed_when: false
          failed_when: false

        - name: Get all essential and required packages
          ansible.builtin.shell: |
            dpkg-query -W -f='${Package} ${Essential} ${Priority}\n' | \
              awk '($2 == "yes" || $3 == "required" || $3 == "important") {print $1}' | sort -u
          register: essential_packages_raw
          changed_when: false

    - name: Compute and prune unmanaged APT packages
      vars:
        manually_installed: "{{ manually_installed_raw.stdout_lines | default([]) }}"
        managed_deps: "{{ managed_deps_raw.stdout_lines | default([]) }}"
        essential_packages: "{{ essential_packages_raw.stdout_lines | default([]) }}"
        all_protected: "{{ (protected_apt_packages + managed_apt_packages + managed_deps + essential_packages) | unique }}"
        unmanaged_apt: "{{ manually_installed | difference(all_protected) }}"
      when: unmanaged_apt | length > 0
      block:
        - name: Confirm APT package pruning
          ansible.builtin.pause:
            prompt: |
              ⚠️  WARNING: You are about to remove APT packages.

              The following will be purged:
              {{ unmanaged_apt | to_nice_yaml }}

              Press Enter to continue, or Ctrl+C and then 'A' to abort.

        # APT handles dependency ordering automatically when given the full list.
        - name: Purge unmanaged APT packages with autoremove
          ansible.builtin.apt:
            name: "{{ unmanaged_apt }}"
            state: absent
            purge: true
            autoremove: true
          register: apt_purge_result

        - name: Run additional autoremove to clean orphaned dependencies
          ansible.builtin.apt:
            autoremove: true
            purge: true
